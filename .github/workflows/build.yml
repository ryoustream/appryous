name: Build AppRyous APK

on:
  push:
    branches: [ main, develop ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Get mpv-android release info
        id: mpv_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/mpv-android/mpv-android/releases/latest")

          TAG=$(echo "$RELEASE" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "MPV tag: $TAG"

          APK_URL=$(echo "$RELEASE" | python3 scripts/find_mpv_apk.py)
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
          echo "APK: $APK_URL"

      - name: Cache libmpv.so
        id: cache_mpv
        uses: actions/cache@v4
        with:
          path: app/src/main/jniLibs
          key: libmpv-${{ steps.mpv_release.outputs.tag }}-v3

      - name: Download and extract libmpv.so
        if: steps.cache_mpv.outputs.cache-hit != 'true'
        run: |
          set -e
          curl -fL --retry 3 --retry-delay 10 \
            --connect-timeout 30 --max-time 300 \
            -o /tmp/mpv.apk "${{ steps.mpv_release.outputs.apk_url }}"
          echo "Size: $(du -h /tmp/mpv.apk | cut -f1)"
          mkdir -p /tmp/mpv-extract
          unzip -q /tmp/mpv.apk "lib/*" -d /tmp/mpv-extract
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            SRC="/tmp/mpv-extract/lib/$ABI/libmpv.so"
            DST="app/src/main/jniLibs/$ABI/libmpv.so"
            mkdir -p "app/src/main/jniLibs/$ABI"
            if [ -f "$SRC" ]; then
              cp "$SRC" "$DST"
              echo "OK $ABI $(du -h $DST | cut -f1)"
            else
              echo "SKIP $ABI"
            fi
          done
          if [ ! -f "app/src/main/jniLibs/arm64-v8a/libmpv.so" ]; then
            echo "FATAL: arm64-v8a/libmpv.so tidak ditemukan"
            find /tmp/mpv-extract -name "*.so" | head -20
            exit 1
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-build-cache

      - name: Build Release APK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: ./gradlew assembleRelease --stacktrace --no-build-cache

      - name: Sign Release APK
        if: >-
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) &&
          env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64:   ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/keystore.jks
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools/" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks /tmp/keystore.jks \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/appryous-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          rm -f /tmp/keystore.jks
          echo "APK signed"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AppRyous-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Release APK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: AppRyous-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/appryous-signed.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
